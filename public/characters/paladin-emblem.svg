<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 270" fill="currentColor">
  <!-- Staff shaft -->
  <rect x="96" y="110" width="8" height="130" rx="3"/>
  <!-- Staff bottom cross-bar -->
  <rect x="84" y="232" width="32" height="7" rx="3"/>
  <!-- Staff bottom diamond gem -->
  <polygon points="100,255 108,246 100,237 92,246"/>
  <!-- Staff mid collar -->
  <rect x="91" y="168" width="18" height="7" rx="3"/>

  <!-- Diagonal scroll / banner -->
  <path d="M44,128 C52,115 64,112 76,110 L156,162 C148,175 136,178 124,176 Z"/>
  <path d="M62,112 L148,163" fill="none" stroke="white" stroke-width="2" opacity="0.35"/>
  <path d="M50,132 L136,183" fill="none" stroke="white" stroke-width="2" opacity="0.35"/>

  <!-- ORB outer ring -->
  <circle cx="100" cy="76" r="36" fill="none" stroke="currentColor" stroke-width="7"/>
  <!-- ORB inner fill (white) to mask staff behind it -->
  <circle cx="100" cy="76" r="29.5" fill="white"/>

  <!-- Inner cross arms -->
  <rect x="97.5" y="47" width="5" height="58" rx="2"/>
  <rect x="71" y="73.5" width="58" height="5" rx="2"/>

  <!-- Center shield silhouette -->
  <path d="M100,61 L110,70 L110,83 L100,93 L90,83 L90,70 Z"/>
  <!-- Shield inner diamond -->
  <path d="M100,69 L105,78 L100,87 L95,78 Z" fill="white"/>

  <!-- Top finial knob -->
  <circle cx="100" cy="39" r="6"/>
  <rect x="97.5" y="39" width="5" height="7" rx="2"/>

  <!-- LEFT arm -->
  <rect x="18" y="73.5" width="48" height="5" rx="2"/>
  <polygon points="52,69 64,76 52,83"/>
  <polygon points="24,69 12,76 24,83"/>
  <circle cx="18" cy="76" r="9" fill="none" stroke="currentColor" stroke-width="4"/>

  <!-- RIGHT arm -->
  <rect x="134" y="73.5" width="48" height="5" rx="2"/>
  <polygon points="148,69 136,76 148,83"/>
  <polygon points="176,69 188,76 176,83"/>
  <circle cx="182" cy="76" r="9" fill="none" stroke="currentColor" stroke-width="4"/>

  <!-- Decorative upper spikes -->
  <path d="M68,52 L76,62 L66,64 Z"/>
  <path d="M132,52 L124,62 L134,64 Z"/>

  <!-- Staff-top collar at orb base -->
  <rect x="91" y="108" width="18" height="6" rx="3"/>
</svg>
